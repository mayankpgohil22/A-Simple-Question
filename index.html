<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a question... 💖</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 90%;
            position: relative;
            z-index: 10;
            margin: 20px auto;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            color: #d63384;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .gif-container img {
            width: 100%;
            max-width: 320px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            height: 60px;
        }

        button {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        #yesBtn {
            background-color: #4caf50;
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background-color: #dc3545;
            color: white;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.4);
            width: 100%;
            height: 100%;
            white-space: nowrap;
        }

        .no-btn-wrapper {
            display: inline-block;
            width: auto;
            height: auto;
            transition: left 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), top 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .poll-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .poll-btn {
            background-color: #fff;
            color: #333;
            border: 2px solid #fecfef;
            padding: 14px;
            border-radius: 15px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .poll-btn:hover {
            background-color: #d63384;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(214, 51, 132, 0.2);
        }

        .secret-option {
            background: none;
            border: none;
            color: #d63384;
            font-size: 0.9rem;
            text-decoration: underline;
            cursor: pointer;
            margin-top: 10px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .secret-option:hover {
            opacity: 1;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: explode 1.2s ease-out forwards;
            z-index: 999;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="page1" class="container">
        <div class="gif-container">
            <img id="mainGif" src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExYjZiNWlvYjF5YmxqbGdkMm51ODB4Z2c4dGV6dG5rbDRqbm50ZHB6ZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/gKHGnB1ml0moQdjhEJ/giphy.gif" alt="Cute asking bear">
        </div>
        <h1 id="question">Would you like to go out with me? 🌹</h1>
        
        <div class="buttons">
            <button id="yesBtn" onclick="selectYes()">Yes!</button>
            <div id="noWrapper" class="no-btn-wrapper" onmouseenter="moveNoButton()" onclick="moveNoButton()">
                <button id="noBtn">No</button>
            </div>
        </div>
    </div>

    <div id="page2" class="container hidden" style="opacity: 0; transform: scale(0.95);">
        <div class="gif-container">
            <img id="pollGif" src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3N280OGRtZnZ6Yzl1NjgxNWNjN3R0cWR0aXJ6MnNwOXRvemVtYXZlbiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/gScknZrEti5Rj8AjUI/giphy.gif" alt="Thinking">
        </div>
        <h1 id="pollTitle">What kind of date would you like to go on? 🥰</h1>
        
        <div class="poll-options">
            <button class="poll-btn" onclick="submitPoll('Beach and Beer Date 🏖️🍺')">Beach and Beer Date</button>
            <button class="poll-btn" onclick="submitPoll('Beach and Wine Date 🏖️🍷')">Beach and Wine Date</button>
            <button class="poll-btn" onclick="submitPoll('Beach and Whiskey Date 🏖️🥃')">Beach and Whiskey Date</button>
            <button class="poll-btn" onclick="submitPoll('Beach and Rum Date 🏖️🍹')">Beach and Rum Date</button>
            <button class="secret-option" onclick="submitPoll('Four-Day Beach Bender containing Beer, Wine, Whiskey, AND Rum! 🏖️🍹🍷🍺🥃')">(Or all of the above? 🥺👉👈)</button>
        </div>
    </div>

    <script>
        const noWrapper = document.getElementById('noWrapper');
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainGif = document.getElementById('mainGif');
        const pollGif = document.getElementById('pollGif'); 
        const question = document.getElementById('question');
        
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');

        const wittyNoPhrases = [
            "No", "Try again! 😜", "Missed me! 🏃‍♂️", "Error 404: Not Found 🛑", 
            "Warm... colder! 🥶", "Click YES! 👀", "Nice try! 💅", "Not an option!"
        ];
        let noClickCount = 0;

        function moveNoButton() {
            const padding = 80;
            const maxX = window.innerWidth - noWrapper.offsetWidth - padding;
            const maxY = window.innerHeight - noWrapper.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            noWrapper.style.position = 'fixed';
            noWrapper.style.left = randomX + 'px';
            noWrapper.style.top = randomY + 'px';

            noClickCount++;
            noBtn.innerText = wittyNoPhrases[noClickCount % wittyNoPhrases.length];
        }

        function createFirecrackers() {
            const colors = ['#FFC107', '#FF5722', '#E91E63', '#9C27B0', '#00BCD4', '#4CAF50', '#FFFF00'];
            const particleCount = 60;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                particle.style.left = (window.innerWidth / 2) + 'px';
                particle.style.top = (window.innerHeight / 2) + 'px';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

                const angle = Math.random() * Math.PI * 2;
                const distance = 100 + Math.random() * 200; 
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;

                particle.style.setProperty('--x', `${x}px`);
                particle.style.setProperty('--y', `${y}px`);

                document.body.appendChild(particle);

                setTimeout(() => { particle.remove(); }, 1200);
            }
        }

        function selectYes() {
            question.innerHTML = "Yayyy! I can't wait! 🥰❤️";
            mainGif.src = "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExNWp4Nm1qenR0anV5N2F4djJkMjE1NXNuNndjamFzajQ4dGZjYmdpbyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/0ixAZaU8Gp8R5TdRQT/giphy.gif";
            
            noWrapper.style.display = 'none';
            yesBtn.style.transform = 'scale(1.2)';
            yesBtn.style.pointerEvents = 'none';
            
            createFirecrackers();

            setTimeout(() => { question.innerHTML = "fr? no takebacks... 🤔💍"; }, 1500);
            setTimeout(() => { question.innerHTML = "Setting up the Best options... ⏳✨"; }, 3200);

            setTimeout(() => {
                page1.style.opacity = '0';
                page1.style.transform = 'scale(0.95)';
                
                setTimeout(() => {
                    page1.classList.add('hidden');
                    page2.classList.remove('hidden');
                    
                    void page2.offsetWidth; 
                    
                    page2.style.opacity = '1';
                    page2.style.transform = 'scale(1)';
                }, 500);
            }, 5000); 
        }

        function submitPoll(choice) {
            const optionsDiv = document.querySelector('.poll-options');
            document.getElementById('pollTitle').innerHTML = `Locking it in! See you soon for our ${choice}! 😉❤️`;
            
            // Fixed direct-delivery GIF link
            pollGif.src = "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHF1cW1tMGlvcWtwN3hnNTlzZGoybnkzeWYwZGxoZmZ2dXJydnhwbiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/ujTVMASREzuRbH6zy5/giphy.gif";
            
            optionsDiv.innerHTML = `<p style="font-size: 1.2rem; color: #d63384; font-weight: bold; margin-top: 20px;">Screenshot this and send it to me! 📸</p>`;
        }
    </script>
</body>
</html>
